name: Build Windows Installer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build print bridge
      - name: Build print bridge
        run: |
          cd print-bridge
          npm install
          npm run build:win

      # Build Electron app
      - name: Install root deps
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win

      # Upload artifacts
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: stery-pos-installer
          path: dist/*
